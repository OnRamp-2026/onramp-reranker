# onramp-reranker ClusterIP Service.
# onramp-api가 RERANKER_SERVICE_URL=http://onramp-reranker:8080 으로 호출.
# (통신 테스트엔 카나리 파드에 라벨 app=onramp-reranker 를 달아 이 Service가 잡게 한다.
#  GitOps Deployment에도 동일 라벨/포트를 쓰면 그대로 재사용.)
apiVersion: v1
kind: Service
metadata:
  name: onramp-reranker
  namespace: onramp
spec:
  selector:
    app: onramp-reranker
  ports:
    - name: http
      port: 8080
      targetPort: 8080
