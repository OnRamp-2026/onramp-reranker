# ⚠️ 임시 검증용 Pod — 운영 배포 아님 (#72 1단계).
#   빌드·푸시한 onramp-reranker 이미지를 단독 파드로 띄워 /rerank 동작 + 메모리/동시성을 실측한다.
#   운영 Deployment/GitOps와 무관. 끝나면 kubectl delete pod.
apiVersion: v1
kind: Pod
metadata:
  name: onramp-reranker-canary
  namespace: onramp
spec:
  restartPolicy: Never
  imagePullSecrets:
    - name: harbor-image-pull-secret
  nodeSelector:
    kubernetes.io/arch: amd64
  containers:
    - name: reranker
      image: amdp-registry.skala-ai.com/skala26a-cloud/onramp-reranker:dev # ← 빌드·푸시한 태그로
      ports:
        - containerPort: 8080
      readinessProbe:
        httpGet:
          path: /health/ready
          port: 8080
        initialDelaySeconds: 10
        periodSeconds: 5
        failureThreshold: 60 # 모델 preload 시간 허용
      resources:
        requests:
          cpu: 500m
          memory: 768Mi
        limits:
          cpu: "2"
          memory: 1536Mi # ← 단독 파드 fit 검증. OOM이면 올려 최소값 탐색
