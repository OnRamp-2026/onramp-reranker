name: Build GPU reranker image (GHCR)

# 네이티브 amd64 러너에서 GPU 이미지 빌드 → GHCR push. (맥 에뮬레이션 대체)
# 수동 트리거: Actions 탭 → 이 워크플로 → Run workflow (tag 입력).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 이미지 태그
        default: gpu-v1
        required: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/onramp-reranker

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GITHUB_TOKEN으로 GHCR push
    steps:
      - uses: actions/checkout@v4

      # CUDA 이미지+모델로 디스크가 크므로 러너 사전설치물 정리(여유 ~25GB 확보).
      - name: Free disk space
        run: |
          sudo rm -rf /opt/hostedtoolcache /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h /

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # fp32 ONNX 모델 생성(torch+optimum, CPU export — ONNX는 플랫폼 독립).
      - name: Generate fp32 ONNX model
        run: |
          python -m pip install --upgrade pip
          pip install ".[build]"
          python scripts/build_onnx.py --precision fp32 --out models/bge-reranker-onnx-fp32
          ls -la models/bge-reranker-onnx-fp32

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.gpu
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ inputs.tag }}

      - name: Summary
        run: |
          echo "pushed: ${{ env.IMAGE }}:${{ inputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "다음: GitHub Packages에서 visibility=Public 설정 → VESSL Custom Image URI에 입력" >> "$GITHUB_STEP_SUMMARY"
