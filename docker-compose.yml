# 로컬 임시 검증용 — 레지스트리 push 없이 빌드한 이미지를 바로 띄워 /rerank 기능 확인.
# (운영 배포 아님. 실제 메모리/성능은 amd64 노드에서 Jenkins→Harbor→Pod로 확인.)
#
#   docker compose up --build      # 또는 이미 빌드했으면: docker compose up
#   curl -sS --json '{"query":"q","passages":["a","b"]}' http://127.0.0.1:8080/rerank
#   docker stats onramp-reranker-local   # 메모리(에뮬레이션이라 절대치는 참고만)
#   docker compose down
services:
  reranker:
    build:
      context: .
      dockerfile: Dockerfile.prebuilt # 사전 생성 모델 COPY (양자화/HF 없음)
    image: amdp-registry.skala-ai.com/skala26a-cloud/onramp-reranker:dev
    container_name: onramp-reranker-local
    ports:
      - "8080:8080"
    mem_limit: 1536m # 노드 limit 모사 (arm맥 에뮬레이션이라 절대 수치는 참고용)
